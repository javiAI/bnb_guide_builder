name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy values so `prisma generate` and `next build` have something to read.
  # Neither the E2E route nor the specs hit the DB or cloud storage.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  R2_ACCOUNT_ID: ci
  R2_ACCESS_KEY_ID: ci
  R2_SECRET_ACCESS_KEY: ci
  R2_BUCKET: ci

jobs:
  unit:
    name: Unit (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  e2e:
    name: E2E (playwright + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload test results (traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
