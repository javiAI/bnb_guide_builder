name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy values so `prisma generate` and `next build` have something to read.
  # Neither the E2E route nor the specs hit the DB or cloud storage.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  R2_ACCOUNT_ID: ci
  R2_ACCESS_KEY_ID: ci
  R2_SECRET_ACCESS_KEY: ci
  R2_BUCKET: ci

jobs:
  unit:
    name: Unit (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  migrations:
    name: Migrations (deploy from zero + schema diff)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector:pg16 is the official pgvector image: Postgres 16
        # with the `vector` extension preinstalled. Needed because the 11C
        # migration runs `CREATE EXTENSION IF NOT EXISTS vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Real Postgres for this job (the top-level DATABASE_URL is a dummy
      # used by `prisma generate` / `next build` in the other jobs).
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Apply the full migration chain against a clean DB. Fails if any
      # migration in prisma/migrations/ can't run from zero.
      - name: prisma migrate deploy
        run: npx prisma migrate deploy
      - run: npx prisma generate
      # Fail the job if the deployed DB schema drifts from schema.prisma.
      # --exit-code returns non-zero when the diff is non-empty, so this
      # catches any future schema change merged without a migration.
      - name: prisma migrate diff (deployed vs schema — must be empty)
        run: npx prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel prisma/schema.prisma --exit-code

  evals:
    name: Assistant evals (release gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      EVAL_ARTIFACT_DIR: eval-artifacts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: prisma migrate deploy
        run: npx prisma migrate deploy
      - run: npx prisma generate
      - run: npm run eval:assistant
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-eval-report
          path: eval-artifacts/
          retention-days: 14

  e2e:
    name: E2E (playwright + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      # Dev mode in CI: `next build`'s static-prerender pass connects Prisma
      # against the dummy DATABASE_URL and aborts the build. Dev mode skips
      # that pass and compiles routes on demand. The harness still exercises
      # the real guest pipeline. Local `npm run test:e2e` (build + start)
      # remains the canonical pre-PR check against a real DB.
      - run: npm run test:e2e:dev
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload test results (traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
